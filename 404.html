<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Helm - SoW & Project Tracker</title>
    <script type="text/javascript">
      // Single-page-app redirect for static hosts (e.g. GitHub Pages).
      // Encodes the requested path into a query string and bounces to index.html,
      // which restores it. pathSegmentsToKeep = 1 keeps the "/project-tracker" base.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
