# Runs the whole app on one box: Postgres + Fastify API + nginx.
# Run from the deploy/ directory:  docker compose --env-file .env up -d --build
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${ADMIN_DB_PASSWORD}
      POSTGRES_DB: helm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d helm"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No published ports — only reachable by the api container over the compose network.

  api:
    build: ../backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    # No published ports — nginx proxies to it over the compose network.
    expose:
      - "8080"

  web:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro

volumes:
  pgdata:
