# __DOMAIN__ is substituted by launch-script.sh at deploy time.

# HTTP: serve the ACME challenge for cert renewal, redirect everything else to HTTPS.
server {
    listen 80;
    server_name __DOMAIN__;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: serve the static frontend, proxy /api/ to the Fastify service.
server {
    listen 443 ssl;
    http2 on;
    server_name __DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers for the static site (helmet only covers /api responses).
    # HSTS cannot be delivered via a CSP meta tag, so it must live here.
    # Inherited by location / and location /api/ (neither sets its own add_header).
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Static frontend (built React app), with SPA fallback for client-side routes.
    root /usr/share/nginx/html;
    index index.html;

    # Hashed, immutable build assets — cache hard so repeat visits skip the
    # bundle download. A location-level add_header REPLACES all inherited
    # add_header directives, so nosniff is re-declared here.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — trailing slash on proxy_pass strips the /api prefix, so
    # /api/auth/login -> http://api:8080/auth/login
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 2m;
}
