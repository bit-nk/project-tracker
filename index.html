    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" />
    <script type="text/javascript">
      // Single-page-app deep-link support for static hosts (e.g. GitHub Pages):
      // restore the path that 404.html encoded into the query string.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script>
      // Apply the saved theme before first paint to avoid a flash of the
      // wrong theme (FOUC). Must match the key used in src/hooks/use-theme.ts.
      // Defaults to light unless the user explicitly chose dark.
      (function () {
        try {
          var t = localStorage.getItem("helm-theme") === "dark" ? "dark" : "light";
          var el = document.documentElement;
          el.classList.toggle("dark", t === "dark");
          el.style.colorScheme = t;
        } catch (e) {}
      })();
    </script>
